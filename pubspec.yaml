name: otel_shared_preferences
description: OpenTelemetry instrumentation for `package:shared_preferences`.
  Extension methods on SharedPreferences that wrap write/remove/clear calls
  with key-value-store spans.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_shared_preferences
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  flutter_test:
    sdk: flutter
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
